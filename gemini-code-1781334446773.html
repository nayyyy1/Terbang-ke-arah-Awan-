<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terbang ke arah Awan yang tepat!</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --accent-color: #FFD166;
            --grass-color: #06D6A0;
            --sky-blue: #87CEEB;
        }

        * {
            box-sizing: border-box;
            font-family: 'Poppins', 'Comic Sans MS', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(to bottom, #bfe3f7 0%, #e0f2fe 70%, #9be49b 100%);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        /* Kampung Background Elements */
        .kampung-bg {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 180px;
            z-index: 1;
        }

        .mountain {
            position: absolute;
            bottom: 60px;
            left: -50px;
            width: 300px;
            height: 200px;
            background: #7bc07b;
            border-radius: 50% 50% 0 0;
            opacity: 0.7;
        }

        .mountain-2 {
            position: absolute;
            bottom: 50px;
            right: -80px;
            width: 400px;
            height: 250px;
            background: #62b162;
            border-radius: 50% 50% 0 0;
            opacity: 0.6;
        }

        .house {
            position: absolute;
            bottom: 40px;
            left: 20%;
            width: 80px;
            height: 60px;
            background: #d2a679;
            border: 3px solid #8a5a36;
            border-radius: 4px;
        }

        .roof {
            position: absolute;
            bottom: 100px;
            left: 19%;
            width: 90px;
            height: 0;
            border-left: 45px solid transparent;
            border-right: 45px solid transparent;
            border-bottom: 40px solid #cc5533;
        }

        .padi-field {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(to bottom, #a3e247, #7ec326);
            border-top: 5px solid #8bc34a;
        }

        .coconut-tree {
            position: absolute;
            bottom: 50px;
            right: 25%;
            font-size: 50px;
        }

        /* Main Container */
        .game-container {
            width: 90%;
            max-width: 800px;
            height: 550px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border: 6px solid #fff;
            border-radius: 24px;
            position: relative;
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* HUD & Buttons */
        .hud {
            position: absolute;
            top: 20px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }

        .score-board, .round-board {
            background: white;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: bold;
            color: #2c3e50;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-size: 1.1rem;
        }

        .btn {
            background: var(--accent-color);
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px #e6b800;
            transition: all 0.1s ease;
            color: #4a3600;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px #e6b800;
        }

        .btn-nota {
            background: #ff7096;
            box-shadow: 0 6px #c93b63;
            color: white;
        }
        .btn-nota:active { box-shadow: 0 2px #c93b63; }

        /* Screens */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
